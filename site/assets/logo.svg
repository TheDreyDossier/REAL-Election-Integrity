<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="The Drey Dossier — REAL Election Integrity Division seal">
  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="96" fill="#ffbe2e" stroke="#8b6a1c" stroke-width="2"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#8b6a1c" stroke-width="1.5"/>

  <!-- Circular text: THE DREY DOSSIER (top) / REAL ELECTION INTEGRITY (bottom) -->
  <defs>
    <path id="topArc" d="M 100 100 m -76 0 a 76 76 0 0 1 152 0" fill="none"/>
    <path id="bottomArc" d="M 100 100 m -76 0 a 76 76 0 0 0 152 0" fill="none"/>
  </defs>
  <text font-family="Georgia, serif" font-weight="700" font-size="13.5" fill="#162e51" letter-spacing="3">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">★ THE DREY DOSSIER ★</textPath>
  </text>
  <text font-family="Georgia, serif" font-weight="700" font-size="11" fill="#162e51" letter-spacing="2">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">REAL ELECTION INTEGRITY</textPath>
  </text>

  <!-- Inner navy disk -->
  <circle cx="100" cy="100" r="52" fill="#162e51"/>
  <circle cx="100" cy="100" r="52" fill="none" stroke="#8b6a1c" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="47" fill="none" stroke="#ffbe2e" stroke-width="0.75" opacity="0.6"/>

  <!-- DD serif monogram, interlocked -->
  <g fill="#ffbe2e" font-family="Georgia, 'Times New Roman', serif" font-weight="700">
    <text x="79" y="122" font-size="66" text-anchor="middle" letter-spacing="-4">D</text>
    <text x="121" y="122" font-size="66" text-anchor="middle" letter-spacing="-4">D</text>
  </g>

  <!-- EST. 2026 bottom banner text -->
  <text x="100" y="178" font-family="Georgia, serif" font-weight="700" font-size="9" fill="#162e51" text-anchor="middle" letter-spacing="1.5">EST. 2026</text>
</svg>
